<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Gestor de Finanças</title>

</head>
<body>
    <header>
        <h1>Gestor de Finanças</h1>
    </header>
    <main>
        <section id="registers">
            <div class="register expense">
                <p>18/01/2023</p>
                <p class="amount">R$ 5,00</p>
                <p>Descrição</p>
                <p>Valor</p>
                <button>Editar</button>
                <button>Excluir</button>
            </div>
            <div class="register income">
                <p>18/01/2023</p>
                <p class="amount">R$ 5000,00</p>
                <p>Descrição</p>
                <p>Valor</p>
                <button>Editar</button>
                <button>Excluir</button>
            </div>
        </section>
        <h2>Registros</h2>
    </main>
    <footer>
        <p>Gestor de Finanças - Todos os direitos reservados</p>
    </footer>
</body>
</html>
